openapi: "3.0.3"
info:
  title: 通用商品短视频生成 API
  version: "0.1.0"
  description: 通用商品短视频 AI 生成应用后端接口

servers:
  - url: http://localhost:8000/api/v1
    description: 本地开发

paths:
  /media/{asset_id}/access:
    get:
      summary: 获取私有媒体临时访问 URL
      tags: [Media]
      parameters:
        - name: asset_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: 默认一小时有效的只读 URL
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MediaAccess" }
        "404":
          description: 资产不存在或不属于当前用户
  /provider-model-catalog:
    get:
      summary: 查询平台维护的、可按阶段能力过滤的模型目录
      tags: [Model configurations]
      parameters:
        - name: capability
          in: query
          schema: { type: string, enum: [creative_planning, scriptwriting, keyframe_image, clip_video, voice_generation, viral_analysis] }
      responses:
        "200":
          description: 可用目录模型
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ProviderModelCatalogEntry" }
  /model-configurations:
    get:
      summary: 列出当前用户的模型配置；绝不返回凭据
      tags: [Model configurations]
      responses:
        "200":
          description: 模型配置
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ModelConfiguration" }
    post:
      summary: 从模板或私有 OpenAI-compatible endpoint 创建用户拥有的 BYOK 模型配置
      tags: [Model configurations]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ModelConfigurationCreate" }
      responses:
        "201":
          description: 未验证的模型配置
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ModelConfiguration" }
  /model-configurations/{configuration_id}/verify:
    post:
      summary: 以无计费探针验证模型配置
      tags: [Model configurations]
      parameters:
        - name: configuration_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: 验证状态
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ModelConfiguration" }
  /model-configurations/{configuration_id}:
    patch:
      summary: 更新模型配置；更新后需重新验证
      tags: [Model configurations]
      parameters:
        - name: configuration_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ModelConfigurationUpdate" }
      responses:
        "200":
          description: 已更新配置
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ModelConfiguration" }
    delete:
      summary: 删除从未被任务引用的模型配置
      tags: [Model configurations]
      parameters:
        - name: configuration_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204": { description: 已删除 }
        "409": { description: 已被任务或默认选择引用 }
  /model-configurations/{configuration_id}/revoke:
    post:
      summary: 撤销配置并销毁其 BYOK
      tags: [Model configurations]
      parameters:
        - name: configuration_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: 已撤销配置
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ModelConfiguration" }
  /stage-model-defaults/{stage}:
    put:
      summary: 设置一个已验证且能力兼容的阶段默认模型
      tags: [Model configurations]
      parameters:
        - name: stage
          in: path
          required: true
          schema: { type: string, enum: [creative_planning, scriptwriting, keyframe_image, clip_video, voice_generation, viral_analysis] }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StageModelDefaultUpsert" }
      responses:
        "200":
          description: 已保存默认选择
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StageModelDefault" }
  /tasks/{task_id}/stage-model-selections:
    get:
      summary: 查询任务冻结的阶段模型选择及非敏感解析快照
      tags: [Tasks]
      parameters:
        - name: task_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: 阶段模型选择
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/StageModelSelection" }
  /tasks/{task_id}/stage-model-selections/{stage}:
    put:
      summary: 显式替换未开始或要求替换的任务阶段模型
      tags: [Tasks]
      parameters:
        - name: task_id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: stage
          in: path
          required: true
          schema: { type: string, enum: [creative_planning, scriptwriting, keyframe_image, clip_video, voice_generation, viral_analysis] }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StageModelSelectionUpdate" }
      responses:
        "200":
          description: 已替换的冻结选择
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StageModelSelection" }
        "409": { description: 阶段已有生成输出；需显式再生成 }
  /categories:
    get:
      summary: 品类列表
      operationId: listCategories
      tags: [Categories]
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: 当前用户的品类
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryList"
    post:
      summary: 原子创建品类及属性模板
      operationId: createCategory
      tags: [Categories]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryCreate"
      responses:
        "201":
          description: 已创建
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "422":
          $ref: "#/components/responses/ValidationError"

  /categories/{category_id}:
    parameters:
      - $ref: "#/components/parameters/CategoryId"
    get:
      summary: 品类详情及完整属性模板
      operationId: getCategory
      tags: [Categories]
      responses:
        "200":
          description: 品类详情
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      summary: 原子更新品类及完整属性模板
      operationId: updateCategory
      tags: [Categories]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryUpdate"
      responses:
        "200":
          description: 已更新
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "409":
          description: 模板版本冲突
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemplateConflictError"
        "422":
          $ref: "#/components/responses/ValidationError"
    delete:
      summary: 删除未被商品引用的品类
      operationId: deleteCategory
      tags: [Categories]
      responses:
        "204": { description: 已删除 }
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: 品类仍被商品引用
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryReferencedError"

  /products:
    post:
      summary: 创建产品
      operationId: createProduct
      tags: [Products]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductCreate"
      responses:
        "201":
          description: 已创建
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "409":
          description: 品类模板版本已更新
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemplateConflictError"
        "422":
          $ref: "#/components/responses/ValidationError"
    get:
      summary: 产品列表
      operationId: listProducts
      tags: [Products]
      parameters:
        - name: name
          in: query
          description: 按商品名称搜索
          schema: { type: string }
        - name: category_id
          in: query
          schema: { type: string, format: uuid }
        - name: sort
          in: query
          schema:
            type: string
            enum: [name, -name, created_at, -created_at, updated_at, -updated_at]
            default: -updated_at
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: page_size
          in: query
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: 产品列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductList"

  /products/{product_id}:
    get:
      summary: 查询产品
      operationId: getProduct
      tags: [Products]
      parameters:
        - name: product_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: 产品详情
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    put:
      summary: 更新商品
      operationId: updateProduct
      tags: [Products]
      parameters:
        - $ref: "#/components/parameters/ProductId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductCreate"
      responses:
        "200":
          description: 已更新
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "409":
          description: 品类模板版本已更新
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemplateConflictError"
        "422":
          $ref: "#/components/responses/ValidationError"
    delete:
      summary: 删除商品（已有任务保留快照）
      operationId: deleteProduct
      tags: [Products]
      parameters:
        - $ref: "#/components/parameters/ProductId"
      responses:
        "204": { description: 已删除 }
        "404":
          $ref: "#/components/responses/NotFound"

  /products/main-image/generate:
    post:
      summary: 为未保存的商品草稿生成 AI 主图候选
      operationId: generateProductMainImage
      tags: [Products]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MainImageGenerateRequest"
      responses:
        "201":
          description: 临时候选图
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MainImageCandidate"
        "409":
          description: 品类模板版本已更新
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemplateConflictError"
        "422":
          $ref: "#/components/responses/ValidationError"

  /products/main-image/upload:
    post:
      summary: 上传商品主图并创建私有 Media Asset
      operationId: uploadProductMainImage
      tags: [Products]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string, format: binary }
      responses:
        "201":
          description: 已创建的主图资产
          content:
            application/json:
              schema:
                type: object
                required: [asset_id, url]
                properties:
                  asset_id: { type: string, format: uuid }
                  url: { type: string, format: uri }

  /initialization-status:
    get:
      summary: 查询当前用户样例目录初始化状态
      operationId: getInitializationStatus
      tags: [Initialization]
      responses:
        "200":
          description: 初始化状态；尚无版本记录时返回 pending
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InitializationStatus"

  /tasks/viral/analyze:
    post:
      summary: 爆款视频分析
      operationId: analyzeViralVideo
      tags: [Tasks]
      description: 预分析爆款视频结构，返回分析结果供用户确认，确认后再创建正式任务
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [product_id, video_url]
              properties:
                product_id:
                  type: string
                  format: uuid
                video_url:
                  type: string
                  format: uri
                  description: 爆款视频链接
      responses:
        "200":
          description: 分析结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ViralAnalysis"

  /tasks:
    post:
      summary: 创建视频任务
      operationId: createTask
      tags: [Tasks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [product_id, type]
              properties:
                product_id: { type: string, format: uuid }
                type: { $ref: "#/components/schemas/TaskType" }
                image_count: { type: integer, default: 4, description: 宣传视频生图数量（仅 promo 类型有效） }
                viral_url: { type: string, format: uri, description: 爆款视频链接（仅 viral 类型必填） }
                script_overrides: { type: object, description: 可选脚本覆盖参数 }
                style_overrides: { type: object, description: 可选的风格覆盖（BGM/转场/字幕等） }
                stage_model_configuration_ids:
                  type: object
                  description: 创建时覆盖用户阶段默认值；每项必须为已验证且能力兼容的配置，任务创建后冻结。
                  additionalProperties: { type: string, format: uuid }
      responses:
        "201":
          description: 任务已创建，返回任务 ID
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VideoTask" }
    get:
      summary: 任务列表
      operationId: listTasks
      tags: [Tasks]
      parameters:
        - name: product_id
          in: query
          schema: { type: string, format: uuid }
        - name: type
          in: query
          schema:
            $ref: "#/components/schemas/TaskType"
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/TaskStatus"
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: page_size
          in: query
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: 任务列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/VideoTask"
                  total:
                    type: integer

  /tasks/{task_id}:
    get:
      summary: 任务详情
      operationId: getTask
      tags: [Tasks]
      parameters:
        - name: task_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: 任务详情（含子步骤状态）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoTask"

  /tasks/{task_id}/script:
    get:
      summary: 获取脚本
      operationId: getScript
      tags: [Tasks]
      parameters:
        - name: task_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: 脚本内容（含生图 prompts）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Script"
    put:
      summary: 审核/编辑脚本
      operationId: updateScript
      tags: [Tasks]
      description: 提交编辑后的脚本，approved=true 则进入下一步
      parameters:
        - name: task_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [approved]
              properties:
                approved:
                  type: boolean
                edited_content:
                  type: string
                  description: 编辑后的脚本文本
                image_prompts:
                  type: array
                  items:
                    type: string
                  description: 编辑后的生图 prompts
      responses:
        "200":
          description: 已更新
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Script"

  /tasks/{task_id}/images:
    get:
      summary: 获取任务图片列表
      operationId: listImages
      tags: [Tasks]
      parameters:
        - name: task_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: 图片列表（含审核状态）
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GeneratedImage"

  /tasks/{task_id}/images/{image_id}:
    put:
      summary: 审核图片
      operationId: reviewImage
      tags: [Tasks]
      description: approve=true 通过，approve=false 拒绝（前端随后调用 regenerate）
      parameters:
        - name: task_id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: image_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action:
                  type: string
                  enum: [approve, reject]
      responses:
        "200":
          description: 已更新

  /tasks/{task_id}/images/{image_id}/regenerate:
    post:
      summary: 重新生成图片
      operationId: regenerateImage
      tags: [Tasks]
      parameters:
        - name: task_id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: image_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "202":
          description: 重新生成已入队

  /tasks/{task_id}/video:
    get:
      summary: 下载视频
      operationId: downloadVideo
      tags: [Tasks]
      parameters:
        - name: task_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: 视频文件
          content:
            video/mp4:
              schema:
                type: string
                format: binary
        "404":
          description: 视频未生成完成

components:
  parameters:
    Page:
      name: page
      in: query
      schema: { type: integer, minimum: 1, default: 1 }
    PageSize:
      name: page_size
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    CategoryId:
      name: category_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    ProductId:
      name: product_id
      in: path
      required: true
      schema: { type: string, format: uuid }
  responses:
    ValidationError:
      description: 字段校验失败
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ValidationError"
    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
  schemas:
    MediaAsset:
      type: object
      required: [id, category, content_type, size_bytes, checksum, status, created_at]
      properties:
        id: { type: string, format: uuid }
        category: { type: string, enum: [product_image, source_video, generated_image, video_clip, tts_audio, lipsync_video, character_image, final_video] }
        content_type: { type: string }
        size_bytes: { type: integer, minimum: 0 }
        checksum: { type: string, minLength: 64, maxLength: 64 }
        status: { type: string, enum: [available, unavailable, superseded, pending_delete] }
        created_at: { type: string, format: date-time }
    MediaAccess:
      type: object
      required: [asset_id, url, expires_at]
      properties:
        asset_id: { type: string, format: uuid }
        url: { type: string, format: uri }
        expires_at: { type: string, format: date-time }
    ProviderModelCatalogEntry:
      type: object
      required: [id, provider, model_id, display_name, capabilities, constraints, capability_revision, platform_default_available, is_available]
      properties:
        id: { type: string, format: uuid }
        provider: { type: string }
        model_id: { type: string }
        display_name: { type: string }
        capabilities: { type: array, items: { type: string } }
        constraints: { type: object, additionalProperties: true }
        capability_revision: { type: integer, minimum: 1 }
        platform_default_available: { type: boolean }
        is_available: { type: boolean }
    ModelConfigurationCreate:
      type: object
      properties:
        catalog_model_id: { type: string, format: uuid, nullable: true, description: 只作创建预填的只读模板来源 }
        display_name: { type: string, minLength: 1, maxLength: 255 }
        adapter: { type: string, minLength: 1, maxLength: 80 }
        api_base: { type: string, format: uri, nullable: true, maxLength: 1000 }
        model_id: { type: string, minLength: 1, maxLength: 255 }
        capabilities: { type: array, minItems: 1, items: { type: string } }
        constraints: { type: object, additionalProperties: true }
        credential: { type: string, writeOnly: true }
      anyOf:
        - required: [catalog_model_id, credential]
        - required: [display_name, adapter, model_id, capabilities, credential]
    ModelConfiguration:
      type: object
      required: [id, adapter, provider, model_id, display_name, capabilities, constraints, revision, uses_platform_default, verification_status, first_use_eligible]
      properties:
        id: { type: string, format: uuid }
        catalog_model_id: { type: string, format: uuid, nullable: true }
        adapter: { type: string }
        api_base: { type: string, format: uri, nullable: true }
        provider: { type: string }
        model_id: { type: string }
        display_name: { type: string }
        capabilities: { type: array, items: { type: string } }
        constraints: { type: object, additionalProperties: true }
        revision: { type: integer, minimum: 1 }
        uses_platform_default: { type: boolean }
        verification_status: { type: string, enum: [unverified, verified, unavailable, revoked] }
        verification_error: { type: string, nullable: true }
        first_use_eligible: { type: boolean, description: 无安全探针的配置可在首次真实调用中确定可用性 }
        verified_at: { type: string, format: date-time, nullable: true }
        revoked_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    ModelConfigurationUpdate:
      type: object
      properties:
        display_name: { type: string, minLength: 1, maxLength: 255 }
        adapter: { type: string, minLength: 1, maxLength: 80 }
        api_base: { type: string, format: uri, nullable: true, maxLength: 1000 }
        model_id: { type: string, minLength: 1, maxLength: 255 }
        capabilities: { type: array, minItems: 1, items: { type: string } }
        constraints: { type: object, additionalProperties: true }
        credential: { type: string, writeOnly: true }
    StageModelDefaultUpsert:
      type: object
      required: [model_configuration_id]
      properties:
        model_configuration_id: { type: string, format: uuid }
    StageModelDefault:
      type: object
      required: [stage, model_configuration_id]
      properties:
        stage: { type: string }
        model_configuration_id: { type: string, format: uuid }
    StageModelSelectionUpdate:
      type: object
      required: [model_configuration_id]
      properties:
        model_configuration_id: { type: string, format: uuid }
    StageModelSelection:
      type: object
      required: [stage, model_configuration_id, selection_version, resolution_snapshot, availability_status]
      properties:
        stage: { type: string }
        model_configuration_id: { type: string, format: uuid }
        selection_version: { type: integer, minimum: 1 }
        resolution_snapshot:
          type: object
          description: 非敏感的提供商、模型、目录能力修订和解析选择快照。
        availability_status: { type: string, enum: [available, replacement_required] }
        started_at: { type: string, format: date-time, nullable: true }
    AttributeType:
      type: string
      enum: [text, number, single_select, multi_select, boolean]

    CategoryAttributeInput:
      type: object
      required: [key, label, type]
      properties:
        key: { type: string, maxLength: 100, pattern: "^[A-Za-z][A-Za-z0-9_]*$" }
        label: { type: string, maxLength: 255 }
        type: { $ref: "#/components/schemas/AttributeType" }
        required: { type: boolean, default: false }
        options:
          type: array
          items: { type: string }
          default: []
        sort_order: { type: integer, default: 0 }

    CategoryAttribute:
      allOf:
        - $ref: "#/components/schemas/CategoryAttributeInput"
        - type: object
          required: [id, created_at, updated_at]
          properties:
            id: { type: string, format: uuid }
            created_at: { type: string, format: date-time }
            updated_at: { type: string, format: date-time }

    CategoryCreate:
      type: object
      required: [name, attributes]
      properties:
        name: { type: string, maxLength: 255 }
        description: { type: string, nullable: true }
        attributes:
          type: array
          description: 按此完整有序数组原子提交属性模板
          items: { $ref: "#/components/schemas/CategoryAttributeInput" }

    CategoryUpdate:
      allOf:
        - $ref: "#/components/schemas/CategoryCreate"
        - type: object
          required: [template_version]
          properties:
            template_version: { type: integer, minimum: 1 }

    Category:
      allOf:
        - $ref: "#/components/schemas/CategoryCreate"
        - type: object
          required: [id, template_version, product_count, created_at, updated_at]
          properties:
            id: { type: string, format: uuid }
            template_version: { type: integer, minimum: 1 }
            product_count: { type: integer, minimum: 0 }
            attributes:
              type: array
              items: { $ref: "#/components/schemas/CategoryAttribute" }
            created_at: { type: string, format: date-time }
            updated_at: { type: string, format: date-time }

    CategoryList:
      type: object
      required: [items, total, page, page_size]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/Category" }
        total: { type: integer, minimum: 0 }
        page: { type: integer, minimum: 1 }
        page_size: { type: integer, minimum: 1 }

    ProductDraft:
      type: object
      required: [category_id, name, category_template_version]
      properties:
        category_id: { type: string, format: uuid }
        name: { type: string, maxLength: 255 }
        description: { type: string, nullable: true }
        selling_points:
          type: array
          items: { type: string }
          default: []
        scenarios:
          type: array
          items: { type: string }
          default: []
        attributes:
          type: object
          additionalProperties: true
          default: {}
        category_template_version: { type: integer, minimum: 1 }

    ProductCreate:
      description: 不接受 user_id 或媒体 URL；已上传资产或已确认 AI 候选图二选一
      allOf:
        - $ref: "#/components/schemas/ProductDraft"
        - oneOf:
            - type: object
              required: [main_image_asset_id]
              properties:
                main_image_asset_id: { type: string, format: uuid }
            - type: object
              required: [main_image_candidate_id]
              properties:
                main_image_candidate_id: { type: string, format: uuid }

    Product:
      allOf:
        - $ref: "#/components/schemas/ProductDraft"
        - type: object
          required: [id, main_image_asset_id, main_image_source, created_at, updated_at]
          properties:
            id: { type: string, format: uuid }
            category: { $ref: "#/components/schemas/Category" }
            main_image_asset_id: { type: string, format: uuid }
            main_image_source: { type: string, enum: [asset, ai] }
            task_count: { type: integer, minimum: 0 }
            created_at: { type: string, format: date-time }
            updated_at: { type: string, format: date-time }

    ProductList:
      type: object
      required: [items, total, page, page_size]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/Product" }
        total: { type: integer, minimum: 0 }
        page: { type: integer, minimum: 1 }
        page_size: { type: integer, minimum: 1 }

    MainImageGenerateRequest:
      description: 未保存的商品草稿；用户身份只从认证上下文获取，不接受 user_id
      allOf:
        - $ref: "#/components/schemas/ProductDraft"

    MainImageCandidate:
      type: object
      required: [candidate_id, preview_url, expires_at]
      properties:
        candidate_id: { type: string, format: uuid }
        preview_url: { type: string, format: uri }
        expires_at: { type: string, format: date-time }

    InitializationStatus:
      type: object
      required: [status, sample_version, attempts]
      properties:
        status: { type: string, enum: [pending, completed, failed] }
        sample_version: { type: integer, minimum: 1 }
        attempts: { type: integer, minimum: 0 }
        error_message: { type: string, nullable: true }
        completed_at: { type: string, format: date-time, nullable: true }

    FieldError:
      type: object
      required: [field, code, message]
      properties:
        field: { type: string, description: 字段路径，如 attributes.color }
        code: { type: string }
        message: { type: string }

    ValidationError:
      type: object
      required: [code, message, fields]
      properties:
        code: { type: string, example: validation_error }
        message: { type: string }
        fields:
          type: array
          items: { $ref: "#/components/schemas/FieldError" }

    TemplateConflictError:
      type: object
      required: [code, message, current_template_version]
      properties:
        code: { type: string, enum: [template_version_conflict] }
        message: { type: string }
        current_template_version: { type: integer, minimum: 1 }

    CategoryReferencedError:
      type: object
      required: [code, message, product_count]
      properties:
        code: { type: string, enum: [category_referenced] }
        message: { type: string }
        product_count: { type: integer, minimum: 1 }

    Error:
      type: object
      required: [code, message]
      properties:
        code: { type: string }
        message: { type: string }

    TaskType:
      type: string
      enum: [promo, viral, personify]

    TaskStatus:
      type: string
      enum:
        - pending
        - scripting
        - script_review
        - imaging
        - image_review
        - character_review
        - video_gen
        - compositing
        - done
        - failed

    VideoTask:
      type: object
      properties:
        id:
          type: string
          format: uuid
        product_id:
          type: string
          format: uuid
        type:
          $ref: "#/components/schemas/TaskType"
        status:
          $ref: "#/components/schemas/TaskStatus"
        current_step:
          type: string
          description: 当前步骤描述
        image_count:
          type: integer
          description: 宣传视频总生图数
        approved_count:
          type: integer
          description: 已审核通过数
        error_message:
          type: string
        result_video_url:
          type: string
          format: uri
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Script:
      type: object
      properties:
        id:
          type: string
          format: uuid
        task_id:
          type: string
          format: uuid
        content:
          type: string
          description: Agent 生成的原始脚本
        edited_content:
          type: string
          description: 用户编辑后的脚本
        image_prompts:
          type: array
          items:
            type: string
          description: 生图 prompt 列表
        voiceover_text:
          type: string
          description: 配音文案
        status:
          type: string
          enum: [pending_review, approved]

    GeneratedImage:
      type: object
      properties:
        id:
          type: string
          format: uuid
        task_id:
          type: string
          format: uuid
        prompt:
          type: string
        image_url:
          type: string
          format: uri
        sort_order:
          type: integer
        status:
          type: string
          enum: [pending_review, approved, rejected]

    ViralAnalysis:
      type: object
      properties:
        id:
          type: string
          format: uuid
        task_id:
          type: string
          format: uuid
        source_url:
          type: string
          format: uri
        original_script:
          type: string
          description: 转写后的原视频脚本
        script_structure:
          type: object
          description: |
            脚本结构分析:
            { hook, pain_point, solution, product_showcase, cta }
        shot_list:
          type: array
          items:
            type: object
            properties:
              index:
                type: integer
              description:
                type: string
              duration_seconds:
                type: number
              shot_type:
                type: string
          description: 分镜列表
        style_params:
          type: object
          properties:
            transition:
              type: string
            bgm_style:
              type: string
            subtitle_position:
              type: string
            subtitle_style:
              type: string
