services:
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+asyncpg://agent:agent123@postgres:5432/perfume_video
      LITELLM_BASE_URL: http://litellm:4000/v1
      RUSTFS_BASE_URL: http://rustfs:8001
    volumes:
      - ./src:/app/src
      - /tmp/hyperframes:/tmp/hyperframes
    command: celery -A src.tasks.celery_app worker --loglevel=info --concurrency=2 -Q perfume-video
    networks:
      - agent-infra

  beat:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+asyncpg://agent:agent123@postgres:5432/perfume_video
      LITELLM_BASE_URL: http://litellm:4000/v1
      RUSTFS_BASE_URL: http://rustfs:8001
    volumes:
      - ./src:/app/src
      - /tmp/hyperframes:/tmp/hyperframes
    command: celery -A src.tasks.celery_app beat --loglevel=info
    networks:
      - agent-infra

networks:
  agent-infra:
    external: true
    name: agent-infra
